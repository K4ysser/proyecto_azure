resources:
  jobs:
    Pipline_ELT_Compras:
      name: Pipline ELT Compras
      email_notifications:
        on_start:
          - fabrizzioevc2002@gmail.com
        on_success:
          - fabrizzioevc2002@gmail.com
        on_failure:
          - fabrizzioevc2002@gmail.com
      tasks:
        - task_key: Bronze_Layer
          notebook_task:
            notebook_path: Databricks/01_bronze_layer
            source: GIT
        - task_key: Silver_Layer
          depends_on:
            - task_key: Bronze_Layer
          notebook_task:
            notebook_path: Databricks/02_silver_layer
            source: GIT
        - task_key: Gold_Layer
          depends_on:
            - task_key: Silver_Layer
          notebook_task:
            notebook_path: Databricks/03_gold_layer
            source: GIT
      git_source:
        git_url: https://github.com/K4ysser/proyecto_azure.git
        git_provider: gitHub
        git_branch: feature/incremental
      queue:
        enabled: true
      parameters:
        - name: fecha_carga
          default: 2025-06-30
        - name: tipo_carga
          default: Incremental
        - name: meses
          default: "2"
      performance_target: PERFORMANCE_OPTIMIZED
